<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tomorin New Tab</title>
  <link rel="stylesheet" href="style.css?v=0.1.27">
</head>
<body>
  <main class="newtab-shell">
    <div class="wallpaper-overlay"></div>

    <section class="content" aria-label="New tab dashboard">
      <form class="search-panel" id="searchForm" autocomplete="off">
        <label class="search-box" for="searchInput">
          <span class="search-logo">T</span>
          <input id="searchInput" type="text" placeholder="输入并搜索" spellcheck="false">
        </label>
      </form>

      <section class="shortcut-area" aria-label="Favorite websites">
        <div class="shortcut-page" id="shortcutPage"></div>
        <div class="empty-state" id="emptyState" hidden>
          <p>还没有收藏网站</p>
          <button class="text-button" type="button" data-action="add-shortcut">添加第一个</button>
        </div>
      </section>
    </section>

    <nav class="page-dots" id="pageDots" aria-label="Shortcut pages"></nav>

    <div class="settings-menu" aria-label="Page controls">
      <button class="icon-button settings-trigger" type="button" title="设置">
        <span aria-hidden="true">⚙</span>
      </button>
      <div class="settings-panel">
        <div class="density-control" aria-label="图标大小">
          <button type="button" data-action="set-density" data-density="small" aria-pressed="true">小</button>
          <button type="button" data-action="set-density" data-density="medium" aria-pressed="false">中</button>
          <button type="button" data-action="set-density" data-density="large" aria-pressed="false">大</button>
        </div>

        <div class="toolbar" aria-label="Page controls">
          <label class="icon-button upload-button" title="更换壁纸" data-tooltip="更换壁纸">
            <span aria-hidden="true">◐</span>
            <input id="wallpaperInput" type="file" accept="image/*">
          </label>
          <button class="icon-button" type="button" data-action="open-sync-dialog" title="同步设置" data-tooltip="同步">
            <span aria-hidden="true">⇄</span>
          </button>
          <button class="icon-button" type="button" data-action="reset-wallpaper" title="重置壁纸" data-tooltip="重置壁纸">
            <span aria-hidden="true">↺</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <dialog class="shortcut-dialog" id="shortcutDialog">
    <form method="dialog" class="dialog-card" id="shortcutForm">
      <div class="dialog-head">
        <h2 id="dialogTitle">添加网站</h2>
        <button class="icon-button compact" type="button" data-action="close-dialog" title="关闭">×</button>
      </div>

      <label class="field">
        <span>名称</span>
        <input id="shortcutTitle" type="text" placeholder="TikTok" required>
      </label>

      <label class="field">
        <span>网址</span>
        <input id="shortcutUrl" type="text" placeholder="tiktok.com" required>
      </label>

      <fieldset class="size-field">
        <legend>大小</legend>
        <label><input type="radio" name="shortcutSize" value="small" checked> 小</label>
        <label><input type="radio" name="shortcutSize" value="medium"> 中</label>
        <label><input type="radio" name="shortcutSize" value="large"> 大</label>
      </fieldset>

      <div class="field">
        <span>图标</span>
        <div class="icon-picker">
          <span class="icon-preview" id="shortcutIconPreview"></span>
          <div class="icon-candidates" id="shortcutIconCandidates"></div>
          <label class="text-button upload-icon-button">
            上传
            <input id="shortcutIconInput" type="file" accept="image/*">
          </label>
          <button class="text-button" id="clearShortcutIconButton" type="button" data-action="clear-shortcut-icon">清除</button>
        </div>
      </div>

      <div class="dialog-actions">
        <button class="text-button danger" id="deleteShortcutButton" type="button" data-action="delete-shortcut" hidden>删除</button>
        <span class="dialog-spacer"></span>
        <button class="text-button" type="button" data-action="close-dialog">取消</button>
        <button class="primary-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog class="shortcut-dialog sync-dialog" id="syncDialog">
    <form method="dialog" class="dialog-card" id="syncForm">
      <div class="dialog-head">
        <h2>同步设置</h2>
        <button class="icon-button compact" type="button" data-action="close-sync-dialog" title="关闭">×</button>
      </div>

      <label class="sync-toggle">
        <input id="syncEnabled" type="checkbox">
        <span>启用轻量同步</span>
      </label>

      <label class="field">
        <span>服务器地址</span>
        <input id="syncEndpoint" type="url" placeholder="https://sync.example.com">
      </label>

      <label class="field">
        <span>访问令牌</span>
        <input id="syncToken" type="password" autocomplete="off" placeholder="服务器上的 SYNC_TOKEN">
      </label>

      <p class="sync-status" id="syncStatus">未启用</p>

      <div class="dialog-actions">
        <button class="text-button" type="button" data-action="sync-now">立即同步</button>
        <span class="dialog-spacer"></span>
        <button class="text-button" type="button" data-action="close-sync-dialog">取消</button>
        <button class="primary-button" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js?v=0.1.24"></script>
</body>
</html>
